<!DOCTYPE html>
<html>
<head>
  <title>Guess the Secret Number</title>
</head>
<body>
  <h2>Guess the Secret Number (1–10)</h2>
  
  <!-- Input field -->
  <input type="number" id="userGuess" min="1" max="10">
  <button onclick="checkGuess()">Guess</button>
  
  <!-- Result display -->
  <p id="result"></p>
  
  <script>
    // Step 1: Set the secret number
    const secretNumber = Math.floor(Math.random() * 10) + 1;

    // Step 2: Function to check guess
    function checkGuess() {
      const guess = parseInt(document.getElementById("userGuess").value);
      const result = document.getElementById("result");

      if (guess === secretNumber) {
        result.textContent = "Correct!";
      } else if (guess < secretNumber) {
        result.textContent = "Too Low!";
      } else if (guess > secretNumber) {
        result.textContent = "Too High!";
      } else {
        result.textContent = "Please enter a valid number.";
      }
    }
  </script>
</body>
</html>
